name: Feature Request
description: Suggest an improvement or new feature for Frigate Archive
title: "[Feature]: "
labels:
  - enhancement

body:

  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to Frigate Archive.

        Before submitting, please check the existing issues and roadmap to see whether the idea has already been discussed.

  - type: textarea
    id: problem
    attributes:
      label: Problem or limitation
      description: What problem are you trying to solve?
      placeholder: Describe the current limitation or difficulty.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you think the feature should work.
      placeholder: Explain the requested behaviour.
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example workflow
      description: Show how you would expect to use this feature.
      placeholder: |
        Example:
        1. Configure...
        2. Run...
        3. Frigate Archive should...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried another approach or workaround?
      placeholder: Describe any alternatives you considered.
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Feature category
      options:
        - Archive transfer
        - Verification
        - Database cleanup
        - Restore functionality
        - Notifications
        - Installer or configuration
        - Health Check
        - Logging and reporting
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this feature to you?
      options:
        - Nice to have
        - Useful improvement
        - Important for my setup
        - Blocking my use of Frigate Archive
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Include relevant Unraid, Frigate, storage, camera, or Docker details.
      placeholder: |
        Unraid version:
        Frigate version:
        Number of cameras:
        Recording storage:
        Archive storage:
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add screenshots, diagrams, links, or anything else that may help explain the request.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I have checked the existing issues for a similar request.
          required: true
        - label: I understand that submitting a request does not guarantee it will be implemented.
          required: true
