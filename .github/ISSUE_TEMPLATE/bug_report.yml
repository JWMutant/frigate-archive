name: Bug Report
description: Report a problem with Frigate Archive
title: "[Bug]: "
labels:
  - bug

body:

  - type: markdown
    attributes:
      value: |
        Thank you for helping improve Frigate Archive.

        Before submitting a bug report please:

        - Confirm you are using the latest release.
        - Run the Health Check.
        - Include the requested information below.

  - type: input
    id: version
    attributes:
      label: Frigate Archive Version
      placeholder: "2.1.1"
    validations:
      required: true

  - type: input
    id: unraid
    attributes:
      label: Unraid Version
      placeholder: "7.3.1"
    validations:
      required: true

  - type: input
    id: frigate
    attributes:
      label: Frigate Version
      placeholder: "0.17.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the problem
      description: What happened?
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: health
    attributes:
      label: Health Check Result
      options:
        - HEALTHY
        - HEALTHY WITH WARNINGS
        - UNHEALTHY
    validations:
      required: true

  - type: textarea
    id: health_output
    attributes:
      label: Health Check Output
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Anything else that might help?
