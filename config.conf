############################################
# Frigate Archive V2 Configuration
############################################


############################################
# Paths
############################################

# Recording location
SOURCE="/mnt/disks/cctv/recordings"

# Archive destination
ARCHIVE="/mnt/user/FrigateArchive"

# Frigate Docker container
CONTAINER="frigate"

# Frigate database
FRIGATE_DB="/mnt/user/appdata/frigate/frigate.db"



############################################
# Archive Thresholds
############################################

# Start archive when drive reaches this %
START_THRESHOLD=50

# Continue archive until drive drops below this %
STOP_THRESHOLD=40



############################################
# Database / Log Retention
############################################

# Number of Frigate database backups to keep
DB_BACKUP_KEEP=7

# Number of archive logs to keep
KEEP_LOGS=30



############################################
# Notifications
############################################

ENABLE_NOTIFICATIONS=true

NOTIFICATION_TITLE="Frigate Archive V2"



############################################
# Lock File
############################################

LOCKFILE="/tmp/frigate_archive_v2.lock"



############################################
# Logging
############################################

LOG_DIR="/boot/config/custom/frigate-archive/logs"

LOGFILE="$LOG_DIR/archive_$(date +%F).log"



############################################
# Safety
############################################

TEST_MODE=false
